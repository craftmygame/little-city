<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Little Taipei — character preview (dev only)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#a9d3ce;font-family:system-ui,sans-serif}
  #app{position:fixed;inset:0}
  #hud{position:fixed;top:12px;left:12px;display:flex;gap:8px;z-index:5}
  #hud button{font:600 14px system-ui;padding:8px 14px;border-radius:10px;border:2px solid #1d332e;
    background:rgba(255,255,255,.92);color:#1d332e;cursor:pointer}
  #hud button.on{background:#1d332e;color:#fff}
  #tip{position:fixed;bottom:10px;left:12px;color:#1d332e;font:500 13px system-ui;opacity:.75;z-index:5}
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <button data-mode="idle" class="on">Idle</button>
  <button data-mode="walk">Walk</button>
  <button data-mode="run">Run</button>
  <button id="spin">Turntable</button>
</div>
<div id="tip">drag to orbit · scroll to zoom</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { makeCharacter, createCharacterAnimator } from './character.js';

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.getElementById('app').appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color('#a9d3ce');

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
camera.position.set(0,1.7,7.2);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,0.95,0); controls.enableDamping=true;

// light rig ~= game: one warm sun + soft ambient
const sun=new THREE.DirectionalLight('#fff4e0',1.25); sun.position.set(3,6,4); scene.add(sun);
scene.add(new THREE.AmbientLight('#ffffff',0.55));

// ground disc, warm cream like the game's low sky band
const ground=new THREE.Mesh(new THREE.CircleGeometry(9,48),new THREE.MeshToonMaterial({color:'#e7dcc2'}));
ground.rotation.x=-Math.PI/2; scene.add(ground);

// ---- the lineup — reference-inspired cast ----------------------------
const CAST=[
  // red-shirt headphones kid, boba in hand
  { x:-2.6, opt:{ shirt:'#c9433e', pants:'#33363b', skin:'#f7c79a', hair:'#2b2523', hairStyle:'fluffy', headphones:true, shoe:'dark', raglan:false, accessory:'boba' } },
  // player default — teal tee, scooter helmet
  { x:-1.3, opt:{ shirt:'#3b9fb1', pants:'#65705a', skin:'#eab38a', hair:'#3b302b', hairStyle:'fluffy', shoe:'light', raglan:false, accessory:'scooterHelmet' } },
  // THE video kid: cream raglan shoulders + blue body, EasyCard lanyard
  { x: 0.0, opt:{ shirt:'#3f9bd8', pants:'#b3a284', skin:'#ffd9b3', hair:'#26221f', hairStyle:'fluffy', shoe:'dark', raglan:true, accessory:'easycard' } },
  // bob kid with a night-market tanghulu
  { x: 1.3, opt:{ shirt:'#ef9bb3', pants:'#5c6b80', skin:'#d39c73', hair:'#4a3423', hairStyle:'bob', shoe:'light', accessory:'tanghulu' } },
  // capped NPC with a Formosan black bear plushie
  { x: 2.6, opt:{ shirt:'#7fb069', pants:'#4a5a52', skin:'#b87a4f', hair:'#2b2523', hairStyle:'short', cap:'#c2a05a', shoe:'dark', accessory:'bear' } },
];
const rig=new THREE.Group(); scene.add(rig);
const kids=CAST.map((c,i)=>{
  const char=makeCharacter(c.opt);
  char.position.x=c.x;
  rig.add(char);
  const anim=createCharacterAnimator(char,{maxSpeed:3,seed:'preview-'+i,phase:i*1.3});
  return {char,anim};
});

// ---- HUD ------------------------------------------------------------
let mode='idle', spin=false;
const SPEED={idle:0,walk:1.1,run:3};
document.querySelectorAll('#hud button[data-mode]').forEach(b=>{
  b.onclick=()=>{ mode=b.dataset.mode;
    document.querySelectorAll('#hud button[data-mode]').forEach(x=>x.classList.toggle('on',x===b)); };
});
document.getElementById('spin').onclick=(e)=>{ spin=!spin; e.target.classList.toggle('on',spin); };

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

window.__preview={camera,controls,rig,kids,setMode:(m)=>{mode=m}};
const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const dt=Math.min(clock.getDelta(),0.05);
  const speed=SPEED[mode];
  for(const k of kids) k.anim.update(dt,{speed,distance:speed*dt,grounded:true});
  if(spin) rig.rotation.y+=dt*0.6;
  controls.update();
  renderer.render(scene,camera);
});
</script>
</body>
</html>
